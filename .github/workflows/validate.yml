name: Validate Soul Files

on:
  pull_request:
    paths:
      - 'examples/**/*.soul.md'
      - 'schema/soul.schema.json'
      - 'scripts/validate.js'

jobs:
  validate:
    name: Validate all .soul.md files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator dependencies
        run: npm install ajv js-yaml

      - name: Find soul files
        id: find
        run: |
          FILES=$(find . -name "*.soul.md" -not -path "./.git/*" | sort)
          echo "Found soul files:"
          echo "$FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate soul files
        run: |
          FAILED=0
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Validating: $file"
              if ! node scripts/validate.js "$file"; then
                FAILED=1
              fi
            fi
          done <<< "$(find . -name '*.soul.md' -not -path './.git/*' | sort)"

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "One or more soul files failed validation."
            echo "Run 'node scripts/validate.js <file>' locally to see details."
            exit 1
          fi

          echo ""
          echo "All soul files passed validation."
